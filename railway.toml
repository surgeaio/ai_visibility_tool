# Railway worker service (BullMQ). Web app deploys to Vercel separately.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.worker"

[deploy]
startCommand = "npx tsx workers/index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Workers are a long-running process without an HTTP server — no HTTP healthcheck.
