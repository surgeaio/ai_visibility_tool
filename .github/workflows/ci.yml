name: CI

on:
  push:
    branches: [main, master, develop, sprint-a-foundation]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Supabase (required for build-time type checks)
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # App URL
          NEXT_PUBLIC_APP_URL:           ${{ secrets.NEXT_PUBLIC_APP_URL }}
          APP_URL:                       ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # AI Gateway — single OpenRouter key covers all models
          OPENROUTER_API_KEY:            ${{ secrets.OPENROUTER_API_KEY }}
          # Optional legacy direct-provider keys (fallback only)
          OPENAI_API_KEY:                ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_AI_API_KEY:             ${{ secrets.GOOGLE_AI_API_KEY }}
          # Google OAuth
          GOOGLE_CLIENT_ID:              ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:          ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # Security
          ENCRYPTION_KEY:                ${{ secrets.ENCRYPTION_KEY }}
          CRON_SECRET:                   ${{ secrets.CRON_SECRET }}
